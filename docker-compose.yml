version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: outage-drill-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_this
      MYSQL_DATABASE: outage_drill
      MYSQL_USER: drill_user
      MYSQL_PASSWORD: drill_password_change_this
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/scripts:/docker-entrypoint-initdb.d
    networks:
      - outage-drill-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: outage-drill-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: drill_user
      DB_PASSWORD: drill_password_change_this
      DB_NAME: outage_drill
      JWT_SECRET: production-secret-key-change-this
      WECHAT_WEBHOOK_URL: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=your-key
    volumes:
      - ./server/config/config.prod.yaml:/app/config/config.yaml:ro
    networks:
      - outage-drill-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: outage-drill-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - outage-drill-network

volumes:
  mysql_data:
    driver: local

networks:
  outage-drill-network:
    driver: bridge